version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: sg-job-finder-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sguser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sgpassword}
      POSTGRES_DB: ${POSTGRES_DB:-sgjobfinder}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sguser} -d ${POSTGRES_DB:-sgjobfinder}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sg-job-finder-app
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-sguser}:${POSTGRES_PASSWORD:-sgpassword}@postgres:5432/${POSTGRES_DB:-sgjobfinder}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      JOB_JSON_URL: ${JOB_JSON_URL:-https://raw.githubusercontent.com/eaziym/sg-jobs/refs/heads/main/docs/data/jobs.min.json}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      EMAIL_SERVER_HOST: ${EMAIL_SERVER_HOST:-}
      EMAIL_SERVER_PORT: ${EMAIL_SERVER_PORT:-587}
      EMAIL_SERVER_USER: ${EMAIL_SERVER_USER:-}
      EMAIL_SERVER_PASSWORD: ${EMAIL_SERVER_PASSWORD:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@sg-job-finder.app}
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
